[theme]
# Force le mode clair (adieu les blocs noirs !)
base="light"

# Ton Bleu Promess pour les cadres, les barres et les sélections
primaryColor="#0085C5"

# Fond blanc pur
backgroundColor="#FFFFFF"

# Fond légèrement grisé pour la barre sur le côté (pour faire pro)
secondaryBackgroundColor="#F0F2F6"

# Texte en gris très foncé (plus lisible que le noir pur)
textColor="#333333"
